<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарих Connections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <h1 style="margin-bottom: 5px;">Connections game</h1>
    <h2 style="font-size: 1.2rem; font-weight: normal; margin-top: 0; color: #555;">Дүниежүзі тарихы | Juz40.Dzht</h2>

    <p style="font-size: 0.9rem; color: #666; margin-bottom: 5px;">Сөздерді 4 сөзден тұратын 4 топқа бөліңіз</p>
    <p id="date-display" style="font-size: 0.85rem; margin-top: 0; font-weight: bold;"></p>

    <div id="toast-container"></div>

    <div id="game-board" class="grid"></div>

    <div class="controls">
        <button onclick="shuffleBoard()">Араластыру</button>
        <button onclick="checkGuess()">Тексеру</button>
    </div>

    <div id="game-stats" style="margin-top: 20px; display: none;">
        <p id="timer-display">Уақыт: 00:00</p>
        <button id="share-btn" onclick="shareResult()" style="background-color: #333; color: white;">Нәтижені бөлісу 📲</button>
    </div>

    <div id="message"></div>


<div id="game-stats" style="margin-top: 20px; display: none;">

</body>
</html>
